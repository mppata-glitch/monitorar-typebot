global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'traefik'
    dns_sd_configs:
      - names:
          - 'tasks.traefik'
        type: 'A'
        port: 8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'
    metric_relabel_configs:
      - source_labels: [service]
        regex: '(.+)@docker'
        target_label: service_name
        replacement: '${1}'
      - source_labels: [router]
        regex: '(.+)@docker'
        target_label: router_name
        replacement: '${1}'
  - job_name: 'postgresql'
    static_configs:
      - targets: ['pg_exporter:9187']
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
